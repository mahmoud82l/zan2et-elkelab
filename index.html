<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { background-color: #1e1e2f; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 700px; margin: auto; border: 1px solid #3742fa; }
        .custom-file-upload { display: inline-block; padding: 12px 25px; cursor: pointer; background-color: #3742fa; color: white; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .btn { background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; }
        .btn-summary { background-color: #2ed573; }
        .result-box { background-color: #2f3542; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: right; line-height: 1.8; overflow-wrap: break-word; }
        .hidden { display: none; }
        .key-box { background: #2d3436; padding: 15px; border-radius: 10px; border: 1px dashed #2ed573; margin-bottom: 20px; }
        .key-text { color: #2ed573; font-family: monospace; font-weight: bold; user-select: all; cursor: pointer; }
        .motivational { font-style: italic; color: #ff9f43; margin-top: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 منصة زنقة الكلاب</h2>
    <p>تطوير: <b>محمود جمال</b></p>
    <div class="motivational" id="quote">"عاش يا دحيح.. الامتياز بيناديك!"</div>
    <hr style="border: 0.5px solid #3742fa; margin: 20px 0;">

    <div id="keyEntrySection">
        <div class="key-box">
            <p style="margin-top:0">🔑 انسخ كود التفعيل ده وحطه في الخانة اللي تحته:</p>
            <span class="key-text" id="rawKey">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</span>
        </div>
        <input type="text" id="apiKeyInput" placeholder="حط الكود هنا يا بطل..." style="width:80%; padding:10px; border-radius:5px; border:none; margin-bottom:10px;">
        <br>
        <button class="btn" style="background:#3742fa" onclick="activateApp()">تفعيل وتشغيل ⚡</button>
    </div>

    <div id="appInterface" class="hidden">
        <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة هنا (PDF)</label>
        <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="document.getElementById('fileLabel').innerText = '✅ جاهز: ' + this.files[0].name">
        <br>
        <button class="btn btn-summary" onclick="processFile('summary')">لخصلي المنهج</button>
        <button class="btn" onclick="processFile('exam')">امتحنني</button>
        <p style="font-size:12px; color:#aaa;">لو عايز تغير المفتاح <span onclick="resetApp()" style="text-decoration:underline; cursor:pointer">اضغط هنا</span></p>
    </div>

    <div id="resultSection" class="hidden result-box">
        <h3 id="resultTitle">⏳ جاري التحضير...</h3>
        <div id="contentArea"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const quotes = [
        "عاش يا دحيح.. الامتياز بيناديك!",
        "مفيش مستحيل مع محمود جمال.. ذاكر وبطل صياح!",
        "المنهج طويل بس إنت أطول منه يا بطل 🚀",
        "يا رب نخلص ونرتاح.. هانت يا وحش!",
        "اللهم انفعنا بما علمتنا.. ركز يا دكتور!"
    ];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // تشغيل التفعيل
    window.onload = function() {
        if (localStorage.getItem('saved_key')) {
            showApp();
        }
    }

    function activateApp() {
        const inputKey = document.getElementById('apiKeyInput').value.trim();
        if (inputKey.startsWith('gsk_')) {
            localStorage.setItem('saved_key', inputKey);
            showApp();
        } else {
            alert("الكود غلط يا بطل.. اتأكد إنك نسخته كله صح!");
        }
    }

    function showApp() {
        document.getElementById('keyEntrySection').classList.add('hidden');
        document.getElementById('appInterface').classList.remove('hidden');
    }

    function resetApp() {
        localStorage.removeItem('saved_key');
        location.reload();
    }

    async function processFile(action) {
        const apiKey = localStorage.getItem('saved_key');
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع الملف يا محمود!"); return; }

        document.getElementById('resultSection').classList.remove('hidden');
        const contentArea = document.getElementById('contentArea');
        contentArea.innerHTML = "<b>ثواني بقرأ الملف.. الذكاء الاصطناعي بيشغل دماغه 🧠</b>";

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: `لخص بأسلوب نقاط أو امتحنني: ${action}\nالنص: ${fullText.substring(0, 12000)}` }],
                    model: "llama-3.3-70b-versatile"
                })
            });

            const data = await response.json();
            if (data.error) throw new Error("المفتاح اتوقف.. انسخ الكود اللي في المربع تاني.");

            contentArea.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            document.getElementById('resultTitle').innerText = action === 'summary' ? "📝 الملخص:" : "✍️ الامتحان:";

        } catch (err) {
            contentArea.innerHTML = `<b style="color:red">حصلت قفلة:</b> ${err.message}`;
        }
    }
</script>
</body>
</html>
