<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0a0a12; --card: #1e1e2f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-summary { background: var(--success); }
        .btn-exam { background: var(--danger); }
        .result-area { background: #2f3542; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; line-height: 1.8; }
        
        /* ستايل الأسئلة التفاعلية */
        .q-box { background: #1e1e2f; border: 1px solid #3d4451; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .opt-btn { display: block; width: 100%; text-align: right; padding: 12px; margin: 8px 0; background: #3d4451; border: 1px solid #555; border-radius: 8px; color: #fff; cursor: pointer; font-size: 15px; }
        .opt-btn:hover { background: #4b5563; }
        .correct { background: var(--success) !important; border-color: #fff; }
        .wrong { background: var(--danger) !important; border-color: #fff; }
        
        .key-input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
        .hidden { display: none; }
        #score-board { font-size: 1.5rem; font-weight: bold; color: var(--success); margin: 20px 0; padding: 15px; border: 2px solid var(--success); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin-bottom: 5px;">🚀 منصة زنقة الكلاب</h1>
    <p>تطوير المبدع: <span style="color: var(--success); font-weight: bold;">محمود جمال</span></p>
    <div id="quote" style="font-style:italic; color:#ff9f43; margin-bottom:20px;">"عاش يا دحيح.. الامتياز بيناديك!"</div>

    <div id="setup">
        <div style="background:#2d3436; padding:15px; border-radius:10px; border:1px dashed var(--success); margin-bottom:15px;">
            <p style="margin:0 0 10px 0; font-size:14px;">🔑 كود التفعيل (انسخه وحطه تحت):</p>
            <code style="color:var(--success); word-break:break-all;">AIzaSyBoY4hFrj7PGQeTwxv0BM2YxMNhb5G8950</code>
        </div>
        <input type="text" id="apiKey" class="key-input" placeholder="الصق كود التفعيل هنا...">
        <br><button class="btn" style="background:var(--primary)" onclick="activate()">تفعيل وتشغيل ⚡</button>
    </div>

    <div id="mainApp" class="hidden">
        <label for="pdfFile" style="cursor:pointer; background:var(--primary); padding:15px; border-radius:10px; display:inline-block; margin-bottom:15px;">📁 ارفع المحاضرة (PDF)</label>
        <input type="file" id="pdfFile" accept=".pdf" style="display:none" onchange="alert('المحاضرة جاهزة يا وحش!')">
        <br>
        <button class="btn btn-summary" onclick="run('summary')">لخصلي المنهج</button>
        <button class="btn btn-exam" onclick="run('exam')">امتحان تفاعلي 🎵</button>
        <p style="font-size:11px; color:#666; cursor:pointer;" onclick="localStorage.clear(); location.reload();">تغيير المفتاح 🔑</p>
    </div>

    <audio id="music" src="song.mp3" loop></audio>

    <div id="resBox" class="hidden result-area">
        <h3 id="resTitle" style="color: var(--success); border-bottom:1px solid #444; padding-bottom:10px;">جاري المعالجة...</h3>
        <div id="score-board" class="hidden"></div>
        <div id="resContent"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    function activate() {
        const k = document.getElementById('apiKey').value.trim();
        if(k.length > 20) { localStorage.setItem('m_key', k); location.reload(); }
    }

    window.onload = () => { if(localStorage.getItem('m_key')) { document.getElementById('setup').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); } };

    async function run(mode) {
        const file = document.getElementById('pdfFile').files[0];
        if(!file) { alert("ارفع الملف الأول!"); return; }

        const resBox = document.getElementById('resBox');
        const resContent = document.getElementById('resContent');
        const music = document.getElementById('music');
        
        resBox.classList.remove('hidden');
        document.getElementById('score-board').classList.add('hidden');
        resContent.innerHTML = "<b>جاري قراءة الملف وتحليل المنهج.. ثواني يا بطل.. 🧠</b>";
        
        if(mode === 'exam') music.play().catch(() => {});
        else { music.pause(); music.currentTime = 0; }

        try {
            const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
            let text = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                text += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(" ") + " ";
            }

            const prompt = mode === 'summary' ? 
                `لخص النص التالي في نقاط واضحة ومنظمة جداً باللغة العربية:\n${text.substring(0, 10000)}` :
                `قم بعمل 10 أسئلة MCQ من النص التالي. اتبع هذا التنسيق بالضبط لكل سؤال:
                Q: السؤال هنا؟
                A) اختيار 1
                B) اختيار 2
                C) اختيار 3
                D) اختيار 4
                Correct: الحرف الصحيح فقط (A أو B أو C أو D)
                النص: ${text.substring(0, 10000)}`;

            const key = localStorage.getItem('m_key');
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const output = data.candidates[0].content.parts[0].text;

            if (mode === 'summary') {
                document.getElementById('resTitle').innerText = "📝 ملخص محمود جمال:";
                resContent.innerHTML = output.replace(/\n/g, '<br>');
            } else {
                parseAndRenderExam(output);
            }
        } catch (e) { resContent.innerHTML = "حصل خطأ: " + e.message; }
    }

    function parseAndRenderExam(text) {
        document.getElementById('resTitle').innerText = "✍️ امتحان التحدي (تفاعلي):";
        const resContent = document.getElementById('resContent');
        resContent.innerHTML = "";
        const scoreBoard = document.getElementById('score-board');
        
        const qBlocks = text.split(/Q:/g).filter(b => b.trim().length > 10);
        let score = 0;
        let answered = 0;

        qBlocks.forEach((block, idx) => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            const questionText = lines[0];
            const options = lines.filter(l => l.match(/^[A-D]\)/));
            const correctLine = lines.find(l => l.startsWith('Correct:'));
            const correctLetter = correctLine ? correctLine.replace('Correct:', '').trim() : "";

            const qDiv = document.createElement('div');
            qDiv.className = 'q-box';
            qDiv.innerHTML = `<b>${idx+1}. ${questionText}</b>`;

            options.forEach(opt => {
                const letter = opt[0];
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(qDiv.dataset.answered) return;
                    qDiv.dataset.answered = "true";
                    answered++;
                    if(letter === correctLetter) {
                        btn.classList.add('correct');
                        score++;
                    } else {
                        btn.classList.add('wrong');
                        // إظهار الإجابة الصحيحة
                        Array.from(qDiv.querySelectorAll('.opt-btn')).forEach(b => {
                            if(b.innerText.startsWith(correctLetter)) b.classList.add('correct');
                        });
                    }
                    if(answered === qBlocks.length) {
                        scoreBoard.innerText = `درجتك النهائية: ${score} من ${qBlocks.length} 🥳`;
                        scoreBoard.classList.remove('hidden');
                        window.scrollTo({ top: scoreBoard.offsetTop, behavior: 'smooth' });
                    }
                };
                qDiv.appendChild(btn);
            });
            resContent.appendChild(qDiv);
        });
    }
</script>
</body>
</html>
