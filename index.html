<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - نسخة الأمان</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { background-color: #1e1e2f; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 700px; margin: auto; border: 1px solid #3742fa; }
        .custom-file-upload { display: inline-block; padding: 12px 25px; cursor: pointer; background-color: #3742fa; color: white; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; }
        .btn { background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; }
        .btn-summary { background-color: #2ed573; }
        .result-box { background-color: #2f3542; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: right; line-height: 1.8; overflow-wrap: break-word; }
        .hidden { display: none; }
        .key-input { background: #000; color: #0f0; border: 1px solid #3742fa; padding: 10px; width: 80%; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 شقلبلي المنهج</h2>
    <p>بواسطة محمود جمال ونادي</p>
    
    <div id="keySection">
        <p style="color: #ff9f43;">دخل مفتاح Groq بتاعك هنا عشان نشغل المنصة:</p>
        <input type="text" id="userApiKey" class="key-input" placeholder="gsk_xxxxxxxxxxxx...">
        <br>
        <button class="btn" style="background:#3742fa" onclick="saveKey()">حفظ المفتاح وتشغيل</button>
    </div>

    <div id="mainApp" class="hidden">
        <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة هنا (PDF)</label>
        <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="document.getElementById('fileLabel').innerText = '✅ جاهز: ' + this.files[0].name">
        <br>
        <button class="btn btn-summary" onclick="processFile('summary')">لخصلي المنهج</button>
        <button class="btn" onclick="processFile('exam')">امتحنني</button>
        <button class="btn" style="background:#57606f; font-size:12px;" onclick="clearKey()">تغيير المفتاح 🔑</button>
    </div>

    <div id="resultSection" class="hidden result-box">
        <h3 id="resultTitle">⏳ جاري التحميل...</h3>
        <div id="contentArea"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // فحص لو المفتاح متخزن قبل كدة
    window.onload = function() {
        if (localStorage.getItem('my_groq_key')) {
            document.getElementById('keySection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }
    };

    function saveKey() {
        const key = document.getElementById('userApiKey').value.trim();
        if (key.startsWith('gsk_')) {
            localStorage.setItem('my_groq_key', key);
            location.reload();
        } else {
            alert("المفتاح ده مش صح يا حودة، لازم يبدأ بـ gsk_");
        }
    }

    function clearKey() {
        localStorage.removeItem('my_groq_key');
        location.reload();
    }

    async function processFile(action) {
        const apiKey = localStorage.getItem('my_groq_key');
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع الملف يا بطل!"); return; }

        document.getElementById('resultSection').classList.remove('hidden');
        const contentArea = document.getElementById('contentArea');
        contentArea.innerHTML = "<b>ثواني بقرأ المحاضرة.. الـ AI بدأ يشتغل ⚡</b>";

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }

            const prompt = action === 'summary' ? 
                `لخص النص التالي في نقاط واضحة باللغة العربية:\n\n${fullText.substring(0, 15000)}` :
                `قم بعمل 5 أسئلة اختيار من متعدد مع الإجابات:\n\n${fullText.substring(0, 15000)}`;

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: prompt }],
                    model: "llama-3.3-70b-versatile"
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            contentArea.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            document.getElementById('resultTitle').innerText = action === 'summary' ? "📝 الملخص:" : "✍️ الامتحان:";

        } catch (err) {
            contentArea.innerHTML = `<b style="color:red">حصل خطأ:</b> ${err.message}`;
            if (err.message.includes("API key")) clearKey();
        }
    }
</script>
</body>
</html>
