<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0a0a12; --card: #1e1e2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); max-width: 700px; margin: auto; border: 1px solid var(--primary); }
        .motivational { font-style: italic; color: #ff9f43; margin-bottom: 20px; font-size: 1.1rem; font-weight: bold; }
        .key-box { background: #2d3436; padding: 15px; border-radius: 12px; border: 1px dashed var(--success); margin-bottom: 20px; }
        .key-text { color: var(--success); font-family: monospace; font-weight: bold; user-select: all; cursor: pointer; background: #000; padding: 8px; border-radius: 5px; display: block; overflow-wrap: break-word; font-size: 0.85rem; }
        .custom-file-upload { display: inline-block; padding: 15px 30px; cursor: pointer; background-color: var(--primary); color: white; border-radius: 12px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; color: white; }
        .btn-summary { background-color: var(--success); }
        .btn-exam { background-color: var(--danger); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .result-box { background-color: #2f3542; padding: 25px; border-radius: 15px; margin-top: 25px; text-align: right; line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .hidden { display: none; }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; margin-bottom: 15px; text-align: center; }
        footer { margin-top: 30px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary);">🚀 منصة زنقة الكلاب</h1>
    <p>بواسطة: <span style="color: var(--success); font-weight: bold;">محمود جمال</span></p>
    <div class="motivational" id="quote">"الامتياز مش بعيد.. ركز يا دحيح!"</div>
    
    <div id="setup">
        <div class="key-box">
            <p style="margin-top:0; font-size: 0.9rem;">🔑 كود التفعيل (انسخه وحطه تحت):</p>
            <span class="key-text">AIzaSyBoY4hFrj7PGQeTwxv0BM2YxMNhb5G8950</span>
        </div>
        <input type="text" id="userKey" placeholder="حط الكود هنا يا بطل...">
        <br>
        <button class="btn" style="background: var(--primary)" onclick="saveKey()">تفعيل وتشغيل ⚡</button>
    </div>

    <div id="main" class="hidden">
        <label for="fileInput" class="custom-file-upload" id="label">📁 ارفع المحاضرة (PDF)</label>
        <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="ready(this)">
        <br>
        <button class="btn btn-summary" onclick="go('summary')">لخصلي المنهج</button>
        <button class="btn btn-exam" onclick="go('exam')">امتحنني MCQ 🎵</button>
        <p style="font-size: 11px; color: #666; cursor: pointer;" onclick="localStorage.clear(); location.reload();">تغيير المفتاح</p>
    </div>

    <audio id="music" src="song.mp3" loop></audio>

    <div id="res" class="hidden result-box">
        <h3 id="head" style="color: var(--success);">⏳ جاري المعالجة...</h3>
        <hr style="border-color: #444;">
        <div id="content"></div>
    </div>
    <footer>محمود جمال © 2026</footer>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    window.onload = () => { if(localStorage.getItem('k')) { document.getElementById('setup').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); } };
    function saveKey() { const val = document.getElementById('userKey').value.trim(); if(val.length > 20) { localStorage.setItem('k', val); location.reload(); } }
    function ready(el) { if(el.files.length > 0) { document.getElementById('label').innerText = '✅ جاهز: ' + el.files[0].name; const m = document.getElementById('music'); m.play().then(() => m.pause()); } }

    async function go(mode) {
        const input = document.getElementById('fileInput');
        if(input.files.length === 0) { alert("فين الملف؟"); return; }
        
        document.getElementById('res').classList.remove('hidden');
        const content = document.getElementById('content');
        content.innerHTML = "جاري قراءة الملف وتجربة الموديلات المتاحة.. ثواني.. 🧠";
        
        if(mode === 'exam') document.getElementById('music').play().catch(() => {});

        try {
            const pdf = await pdfjsLib.getDocument({data: await input.files[0].arrayBuffer()}).promise;
            let text = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) { text += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(" ") + " "; }

            const prompt = mode === 'summary' ? `لخص هذا النص في نقاط واضحة ومنظمة بالعربية:\n\n${text.substring(0, 10000)}` : `قم بعمل 5 أسئلة MCQ بالاختيارات والإجابات بالعربية من هذا النص:\n\n${text.substring(0, 10000)}`;
            const key = localStorage.getItem('k');
            
            // مصفوفة الموديلات والروابط لتجربة الكل
            const attempts = [
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`
            ];

            let success = false;
            for (let url of attempts) {
                try {
                    const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: [{parts: [{text: prompt}]}]}) });
                    const data = await res.json();
                    if (res.ok) {
                        content.innerText = data.candidates[0].content.parts[0].text;
                        document.getElementById('head').innerText = mode === 'summary' ? "📝 الملخص:" : "✍️ الامتحان:";
                        success = true; break;
                    }
                } catch (e) { console.log("محاولة فاشلة، بنجرب اللي بعدها..."); }
            }

            if (!success) throw new Error("كل محاولات الاتصال فشلت. تأكد من إعدادات API في Google Cloud.");

        } catch (err) { content.innerHTML = `<b style="color:red">عطل:</b> ${err.message}`; document.getElementById('music').pause(); }
    }
</script>
</body>
</html>
