<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0a0a12; --card: #1e1e2f; --chat-ai: #2d3436; --chat-user: #3742fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; text-align: center; overflow-x: hidden; }
        .container { max-width: 650px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .btn { border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; margin: 10px 0; font-weight: bold; color: white; width: 95%; transition: 0.3s; }
        .btn-summary { background: var(--success); }
        .btn-exam { background: var(--danger); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn-chat { background: #eccc68; color: #000; box-shadow: 0 0 15px rgba(236, 204, 104, 0.4); }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .hidden { display: none !important; }
        .file-label { display: block; background: var(--primary); padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; border: 2px dashed #fff; }
        input[type="text"] { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
        
        /* ------------------ واجهة الشات المنفصلة (ChatGPT Style) ------------------ */
        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; text-align: right; }
        .chat-header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); }
        .chat-header h2 { margin: 0; font-size: 1.2rem; color: var(--success); }
        .back-btn { background: var(--danger); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-start; } /* User on right for RTL */
        .msg-row.ai { justify-content: flex-end; } /* AI on left for RTL */
        
        .msg-bubble { max-width: 85%; padding: 15px 20px; border-radius: 15px; line-height: 1.8; font-size: 16px; word-wrap: break-word; }
        .msg-bubble.user { background: var(--chat-user); color: #fff; border-top-right-radius: 0; }
        .msg-bubble.ai { background: var(--chat-ai); color: #e0e0e0; border-top-left-radius: 0; border: 1px solid #444; }
        .msg-bubble a { color: #74b9ff; text-decoration: underline; font-weight: bold; }
        .msg-bubble b { color: #fff; }

        .chat-input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; margin: 0; width: auto; text-align: right; font-size: 16px; padding: 15px; border-radius: 12px; }
        .chat-input-area button { width: auto; margin: 0; padding: 15px 25px; background: var(--success); border-radius: 12px; }
        
        /* ------------------ ستايل الامتحان القديم ------------------ */
        .q-box { background: #1e1e2f; border: 1px solid #3d4451; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: right; }
        .opt-btn { display: block; width: 100%; text-align: right; padding: 12px; margin: 8px 0; background: #3d4451; border: 1px solid #555; border-radius: 8px; color: #fff; cursor: pointer; font-size: 15px; }
        .correct { background: var(--success) !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; }
        #score-board { font-size: 1.8rem; font-weight: bold; color: var(--success); margin: 20px 0; padding: 15px; border: 2px solid var(--success); border-radius: 12px; background: rgba(46, 213, 115, 0.1); }
    </style>
</head>
<body>

<div class="container" id="homePage">
    <h1 style="color: var(--primary); margin: 0 0 10px 0;">🚀 زنقة الكلاب </h1>
    <p style="margin-bottom: 20px;">تطوير : <span style="color: var(--success); font-weight: bold;">محمود جمال</span></p>

    <div id="setupSection">
        <div style="background:#2d3436; padding:15px; border-radius:12px; border:1px dashed var(--success); margin-bottom:15px;">
            <p style="margin:0 0 10px 0; font-size:14px; color: #aaa;">🔑 كود التفعيل للدفعة:</p>
            <code id="keyToCopy" style="color:var(--success); word-break:break-all; font-weight:bold; font-size: 1.1rem; display:block; margin-bottom:10px;">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</code>
            <button onclick="copyMyKey()" style="background:var(--success); border:none; padding:8px 15px; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">📋 نسخ الكود</button>
        </div>
        <input type="text" id="userInputKey" placeholder="الصق كود التفعيل هنا...">
        <br><button class="btn" style="background:var(--primary)" onclick="activate()">تفعيل ودخول للمنصة ⚡</button>
    </div>

    <div id="mainApp" class="hidden">
        <div id="quote" style="font-style:italic; color:#ff9f43; margin-bottom:20px; font-weight:bold;">"عاش يا دحيح.. الامتياز محجوز ليك! 🚀"</div>
        
        <label for="pdfInput" class="file-label" id="fileLabel">📁 اضغط هنا واختار المحاضرة (PDF)</label>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
        
        <button class="btn btn-chat" onclick="openChatMode()">💬 افتح شات المنهج (مفتوح)</button>
        <button class="btn btn-exam" onclick="startProcess('exam')">امتحان شامل تفاعلي 🎵</button>
        
        <p style="font-size: 11px; color: #666; cursor: pointer; margin-top: 15px;" onclick="localStorage.clear(); location.reload();">تغيير المفتاح 🔑</p>
    </div>

    <audio id="examMusic" src="song.mp3" loop></audio>

    <div id="resBox" class="hidden" style="margin-top: 25px;">
        <h3 id="resTitle" style="color: var(--success); border-bottom: 1px solid #444; padding-bottom: 10px;">النتيجة</h3>
        <div id="score-board" class="hidden"></div>
        <div id="resContent" style="text-align:right; line-height:1.8;"></div>
    </div>
</div>

<div id="chatPage" class="hidden">
    <div class="chat-header">
        <h2>💬 شات المنهج - دكتور الـ AI</h2>
        <button class="back-btn" onclick="closeChatMode()">🔙 رجوع</button>
    </div>
    
    <div class="chat-messages" id="chatBox">
        </div>
    
    <div class="chat-input-area">
        <input type="text" id="chatMsg" placeholder="اسأل في أي حاجة، اطلب أسئلة، أو روابط ومصادر..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button class="btn" style="margin:0; padding:10px 20px;" onclick="sendChat()">إرسال 🚀</button>
    </div>
</div>

<script>
    // --- درع الحماية الفولاذي لمحمود جمال ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
        if (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0))) return false;
    };
    (function(){ setInterval(function(){ debugger; }, 100); })();
    // ----------------------------------------

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let globalPdfText = ""; 
    let chatHistory = []; 

    function copyMyKey() {
        const txt = document.getElementById('keyToCopy').innerText;
        navigator.clipboard.writeText(txt);
        alert("تم نسخ الكود بنجاح يا بطل!");
    }

    document.getElementById('pdfInput').onchange = function() {
        if(this.files[0]) document.getElementById('fileLabel').innerText = "✅ تم تحميل: " + this.files[0].name;
    };

    function activate() {
        const k = document.getElementById('userInputKey').value.trim();
        if(k.startsWith('gsk_')) { localStorage.setItem('groq_key', k); location.reload(); }
        else { alert("الكود غلط يا حودة.. اتأكد إنه بيبدأ بـ gsk_"); }
    }

    window.onload = () => {
        if(localStorage.getItem('groq_key')) {
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }
    };

    // --- دالة تحويل النصوص (Markdown & Links Parser) ---
    function formatText(text) {
        // تحويل **نص** إلى Bold
        text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        // تحويل الروابط لنصوص قابلة للضغط
        text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        // تحويل النزول لسطر جديد
        text = text.replace(/\n/g, '<br>');
        return text;
    }

    // --- فتح الشات المفتوح (ChatGPT Style) ---
    async function openChatMode() {
        const fileInput = document.getElementById('pdfInput');
        if(!fileInput.files[0]) { alert("فين المحاضرة يا دحيح؟"); return; }
        
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('chatPage').classList.remove('hidden');
        const chatBox = document.getElementById('chatBox');
        
        // لو دي أول مرة يفتح الشات
        if (chatHistory.length === 0) {
            chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai">جاري قراءة المحاضرة عشان أبقى جاهز.. ثواني ⏳</div></div>`;
            try {
                const arrayBuffer = await fileInput.files[0].arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                globalPdfText = ""; 
                for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
                    globalPdfText += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(" ") + " ";
                }
                
                chatHistory = [{ 
                    role: "system", 
                    content: `أنت مساعد ذكي للمذاكرة. هذا نص المحاضرة: ${globalPdfText.substring(0, 15000)}. أجب على الطالب بأسلوب احترافي وواضح. قم بتنسيق الإجابة باستخدام النجوم العريضة **للعناوين**. إذا طلب معلومات إضافية أو مصادر، قم بتوفير روابط حقيقية (URLs) لمواقع موثوقة.` 
                }];
                
                chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai">أهلاً يا بطل! أنا قريت المحاضرة وحفظتها. تقدر تطلب مني <b>تلخيص</b>، <b>أسئلة معينة</b>، أو <b>أشرحلك جزء</b>، ولو عايز <b>لينكات خارجية للمصادر</b> اطلبها! 🚀</div></div>`;
            } catch(e) {
                chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai" style="background:var(--danger)">حصل خطأ في قراءة الملف: ${e.message}</div></div>`;
            }
        }
    }

    function closeChatMode() {
        document.getElementById('chatPage').classList.add('hidden');
        document.getElementById('homePage').classList.remove('hidden');
    }

    // --- إرسال واستقبال الشات ---
    async function sendChat() {
        const inputField = document.getElementById('chatMsg');
        const msgText = inputField.value.trim();
        if(!msgText) return;

        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="msg-row user"><div class="msg-bubble user">${msgText}</div></div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        chatHistory.push({ role: "user", content: msgText });

        const loadingId = "load-" + Date.now();
        chatBox.innerHTML += `<div id="${loadingId}" class="msg-row ai"><div class="msg-bubble ai">بكتب الرد... ✍️</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const key = localStorage.getItem('groq_key');
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory, model: "llama-3.3-70b-versatile", temperature: 0.7 })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            document.getElementById(loadingId).remove();
            
            // استخدام دالة التنسيق السحرية (Bold, Links, Newlines)
            const formattedReply = formatText(aiReply);
            
            chatBox.innerHTML += `<div class="msg-row ai"><div class="msg-bubble ai">${formattedReply}</div></div>`;
            chatHistory.push({ role: "assistant", content: aiReply });
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch(e) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="msg-row ai"><div class="msg-bubble ai" style="background:var(--danger)">عطل في الاتصال ❌</div></div>`;
        }
    }

    // --- الامتحان التفاعلي القديم (زي ما هو) ---
    async function startProcess(mode) {
        if(mode === 'exam') {
            const fileInput = document.getElementById('pdfInput');
            if(!fileInput.files[0]) { alert("فين المحاضرة يا دحيح؟"); return; }
            document.getElementById('resBox').classList.remove('hidden');
            document.getElementById('resContent').innerHTML = "<b>جاري تجهيز الامتحان.. 🧠</b>";
            document.getElementById('examMusic').play().catch(()=>{});
            
            try {
                const arrayBuffer = await fileInput.files[0].arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let text = "";
                for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) { text += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(" ") + " "; }
                
                const prompt = `قم بعمل امتحان شامل (10 أسئلة) MCQ من النص. التنسيق:
                Q: السؤال؟
                A) اختيار 1
                B) اختيار 2
                C) اختيار 3
                D) اختيار 4
                Correct: الحرف الصحيح (A أو B أو C أو D)
                النص: ${text.substring(0, 15000)}`;

                const key = localStorage.getItem('groq_key');
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{role:"user", content: prompt}], model: "llama-3.3-70b-versatile" })
                });
                const data = await response.json();
                renderInteractiveExam(data.choices[0].message.content);
            } catch (e) { document.getElementById('resContent').innerHTML = "❌ خطأ: " + e.message; }
        }
    }

    function renderInteractiveExam(text) {
        document.getElementById('resTitle').innerText = "✍️ امتحان تفاعلي شامل:";
        const resContent = document.getElementById('resContent'); resContent.innerHTML = "";
        const scoreBoard = document.getElementById('score-board'); scoreBoard.classList.add('hidden');
        const qBlocks = text.split(/Q:/g).filter(b => b.trim().length > 15);
        let score = 0; let answered = 0;

        qBlocks.forEach((block, idx) => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            const questionText = lines[0];
            const options = lines.filter(l => l.match(/^[A-D]\)/));
            const correctLine = lines.find(l => l.startsWith('Correct:'));
            const correctLetter = correctLine ? correctLine.replace('Correct:', '').trim() : "";

            const qDiv = document.createElement('div'); qDiv.className = 'q-box';
            qDiv.innerHTML = `<b>${idx+1}. ${questionText}</b>`;

            options.forEach(opt => {
                const letter = opt[0]; const btn = document.createElement('button');
                btn.className = 'opt-btn'; btn.innerText = opt;
                btn.onclick = () => {
                    if(qDiv.dataset.done) return; qDiv.dataset.done = "true"; answered++;
                    if(letter === correctLetter) { btn.classList.add('correct'); score++; }
                    else { btn.classList.add('wrong'); Array.from(qDiv.querySelectorAll('.opt-btn')).forEach(b => { if(b.innerText.startsWith(correctLetter)) b.classList.add('correct'); }); }
                    if(answered === qBlocks.length) { scoreBoard.innerText = `النتيجة: ${score} من ${qBlocks.length} 🥳`; scoreBoard.classList.remove('hidden'); window.scrollTo({ top: scoreBoard.offsetTop, behavior: 'smooth' }); }
                };
                qDiv.appendChild(btn);
            });
            resContent.appendChild(qDiv);
        });
    }
</script>
</body>
</html>
