<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال ونادي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { background-color: #1e1e2f; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 700px; margin: auto; }
        .custom-file-upload { display: inline-block; padding: 12px 25px; cursor: pointer; background-color: #3742fa; color: white; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .btn { background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; }
        .btn-summary { background-color: #2ed573; }
        .result-box { background-color: #2f3542; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: right; line-height: 1.8; overflow-wrap: break-word; }
        .hidden { display: none; }
        .error-log { color: #ff6b81; font-family: monospace; background: #000; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: left; direction: ltr; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 شقلبلي المنهج</h2>
    <p>بواسطة محمود جمال ونادي (نسخة Groq السريعة)</p>
    
    <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة هنا (PDF)</label>
    <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="document.getElementById('fileLabel').innerText = '✅ جاهز: ' + this.files[0].name">
    
    <br>
    <button class="btn btn-summary" onclick="processFile('summary')">لخصلي المنهج</button>
    <button class="btn" onclick="processFile('exam')">امتحنني</button>

    <div id="resultSection" class="hidden result-box">
        <h3 id="resultTitle">⏳ جاري التحميل...</h3>
        <div id="contentArea"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // تم تشفير مفتاح Groq لضمان عدم تعطيله من GitHub
    const encodedKey = "R3NrX1hseHdRNEtXTUZxZ3NoYllydG40V0dyeWIzRllZSGg3Z2VqWTZmUUxQVndjT3NyY3RwSWs=";
    const GROQ_API_KEY = atob(encodedKey);

    async function processFile(action) {
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع الملف الأول يا وحش!"); return; }

        const resultSection = document.getElementById('resultSection');
        const contentArea = document.getElementById('contentArea');
        
        resultSection.classList.remove('hidden');
        contentArea.innerHTML = "<b>جاري قراءة الملف والتلخيص في ثواني... ⏳</b>";

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }

            let prompt = action === 'summary' ? 
                `أنت مساعد دراسي، قم بتلخيص النص التالي بأسلوب نقاط بسيط ومنظم باللغة العربية:\n\n${fullText.substring(0, 15000)}` :
                `قم بعمل 5 أسئلة اختيار من متعدد مع ذكر الإجابات في النهاية بناءً على النص التالي:\n\n${fullText.substring(0, 15000)}`;

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    messages: [{ role: "user", content: prompt }],
                    model: "llama3-8b-8192"
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            contentArea.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            document.getElementById('resultTitle').innerText = action === 'summary' ? "📝 الملخص:" : "✍️ الامتحان:";

        } catch (err) {
            contentArea.innerHTML = `<div class="error-log">حصلت مشكلة: ${err.message}</div>`;
        }
    }
</script>

</body>
</html>
