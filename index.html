<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0f0f1a; --card: #1e1e2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-width: 700px; margin: auto; border: 1px solid var(--primary); }
        .motivational { font-style: italic; color: #ff9f43; margin-bottom: 20px; font-size: 1.1rem; font-weight: bold; }
        .key-box { background: #2d3436; padding: 15px; border-radius: 12px; border: 1px dashed var(--success); margin-bottom: 20px; }
        .key-text { color: var(--success); font-family: monospace; font-weight: bold; user-select: all; cursor: pointer; background: #000; padding: 5px 10px; border-radius: 4px; display: block; overflow-wrap: break-word; }
        .custom-file-upload { display: inline-block; padding: 15px 30px; cursor: pointer; background-color: var(--primary); color: white; border-radius: 10px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; color: white; }
        .btn-summary { background-color: var(--success); }
        .btn-exam { background-color: var(--danger); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn:hover { transform: scale(1.05); }
        .result-box { background-color: #2f3542; padding: 25px; border-radius: 15px; margin-top: 25px; text-align: right; line-height: 1.8; font-size: 1.1rem; }
        .hidden { display: none; }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; margin-bottom: 15px; text-align: center; }
        footer { margin-top: 30px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 منصة زنقة الكلاب</h1>
    <p>تطوير المبدع: <b>محمود جمال</b></p>
    <div class="motivational" id="quote">"عاش يا دحيح.. الامتياز بيناديك!"</div>
    
    <div id="setupSection">
        <div class="key-box">
            <p style="margin-top:0">🔑 كود التفعيل (انسخه وحطه في الخانة اللي تحت):</p>
            <span class="key-text" id="displayKey">حط_مفتاحك_هنا_يا_محمود</span>
        </div>
        <input type="text" id="userInputKey" placeholder="الصق كود التفعيل هنا...">
        <br>
        <button class="btn" style="background: var(--primary)" onclick="saveKey()">تفعيل وتشغيل ⚡</button>
    </div>

    <div id="mainApp" class="hidden">
        <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة هنا (PDF)</label>
        <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="fileReady(this)">
        <br>
        <button class="btn btn-summary" onclick="startProcessing('summary')">لخصلي المنهج</button>
        <button class="btn btn-exam" onclick="startProcessing('exam')">امتحنني MCQ 🎵</button>
        <p style="font-size: 11px; color: #666; cursor: pointer;" onclick="localStorage.clear(); location.reload();">تغيير المفتاح 🔑</p>
    </div>

    <audio id="bgMusic" src="song.mp3" loop></audio>

    <div id="results" class="hidden result-box">
        <h3 id="resHeader" style="color: var(--success);">⏳ جاري المعالجة...</h3>
        <hr style="border-color: #444;">
        <div id="resContent"></div>
    </div>

    <footer>كل الحقوق محفوظة لـ محمود جمال © 2026</footer>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const quotes = [
        "عاش يا دحيح.. الامتياز محجوز ليك! 🚀",
        "مفيش مستحيل مع محمود جمال.. ركز يا بطل!",
        "المنهج طويل بس إنت أطول منه.. هانت!",
        "اللهم لا سهل إلا ما جعلته سهلاً.. استعن بالله."
    ];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    window.onload = () => {
        if (localStorage.getItem('user_api_key')) {
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }
    };

    function saveKey() {
        const k = document.getElementById('userInputKey').value.trim();
        if (k.length > 20) {
            localStorage.setItem('user_api_key', k);
            location.reload();
        } else { alert("دخل الكود صح يا وحش!"); }
    }

    function fileReady(el) {
        if (el.files.length > 0) document.getElementById('fileLabel').innerText = '✅ جاهز: ' + el.files[0].name;
    }

    async function startProcessing(mode) {
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع الملف يا حودة!"); return; }

        const resDiv = document.getElementById('results');
        const resContent = document.getElementById('resContent');
        const music = document.getElementById('bgMusic');
        
        resDiv.classList.remove('hidden');
        resContent.innerHTML = "<b>جاري قراءة الملف وتحليله.. ثواني وهبهرك.. 🧠</b>";
        
        if (mode === 'exam') {
            music.currentTime = 0;
            music.play().catch(() => console.log("الصوت محتاج تفاعل"));
        }

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text = content.items.map(item => item.str).join(" ") + " ";
                fullText += text;
            }

            const prompt = mode === 'summary' ? 
                `لخص النص التالي في نقاط واضحة ومنظمة باللغة العربية:\n\n${fullText.substring(0, 10000)}` :
                `قم بعمل امتحان 5 أسئلة اختيار من متعدد (MCQ) باللغة العربية من النص التالي. لكل سؤال 4 اختيارات. وفي النهاية اكتب الإجابات الصحيحة. النص:\n\n${fullText.substring(0, 10000)}`;

            const key = localStorage.getItem('user_api_key');
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            document.getElementById('resHeader').innerText = mode === 'summary' ? "📝 الملخص:" : "✍️ امتحان MCQ:";
            resContent.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');

        } catch (err) {
            resContent.innerHTML = `<b style="color:var(--danger)">عطل فني:</b> ${err.message}`;
            music.pause();
        }
    }
</script>
</body>
</html>
