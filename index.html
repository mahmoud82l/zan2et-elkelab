<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { background-color: #1e1e2f; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 700px; margin: auto; }
        .custom-file-upload { display: inline-block; padding: 12px 25px; cursor: pointer; background-color: #3742fa; color: white; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; }
        .btn { background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; }
        .btn-summary { background-color: #2ed573; }
        .result-box { background-color: #2f3542; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: right; line-height: 1.8; }
        .hidden { display: none; }
        .error-log { color: #ff6b81; font-family: monospace; background: #000; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: left; direction: ltr; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 شقلبلي المنهج</h2>
    <p>بواسطة محمود جمال ونادي</p>
    
    <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة هنا (PDF)</label>
    <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="document.getElementById('fileLabel').innerText = '✅ جاهز: ' + this.files[0].name">
    
    <br>
    <button class="btn btn-summary" onclick="processFile('summary')">لخصلي المنهج</button>
    <button class="btn" onclick="processFile('exam')">امتحنني</button>

    <div id="resultSection" class="hidden result-box">
        <h3 id="resultTitle">⏳ جاري التحضير...</h3>
        <div id="contentArea"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // المفتاح المشفر
    const encoded = "QVEuQWI4Uk42STE5U2pPelkzS1ZEcHRxdVNzbEdid3Z4RHNZNnNnYy0tRFB2aWw5U1VXRGc=";
    const API_KEY = atob(encoded);

    async function processFile(action) {
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع الملف الأول يا وحش!"); return; }

        const resultSection = document.getElementById('resultSection');
        const contentArea = document.getElementById('contentArea');
        
        resultSection.classList.remove('hidden');
        contentArea.innerHTML = "ثواني بقرأ الملف وببعته لجوجل..";

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }

            let prompt = action === 'summary' ? 
                `لخص النص ده بأسلوب نقاط بسيط باللغة العربية ومصطلحات مصرية سهلة:\n\n${fullText.substring(0, 10000)}` :
                `اعملي 5 أسئلة MCQ بالإجابات من النص ده:\n\n${fullText.substring(0, 10000)}`;

            // التعديل السحري هنا: استخدمنا v1 بدل v1beta وموديل gemini-1.5-flash
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            // لو الـ 1.5-flash لسه مش متفعل، هنجرب الـ Pro كخطة بديلة فوراً
            if (data.error && data.error.code === 404) {
                const retryRes = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const retryData = await retryRes.json();
                if (retryData.error) throw new Error(retryData.error.message);
                contentArea.innerHTML = retryData.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } else if (data.error) {
                throw new Error(data.error.message);
            } else {
                contentArea.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            }

            document.getElementById('resultTitle').innerText = action === 'summary' ? "📝 الملخص:" : "✍️ الامتحان:";

        } catch (err) {
            contentArea.innerHTML = `<div class="error-log">السبب: ${err.message}<br><br>نصيحة: اتأكد إنك فاتح المشروع في Google AI Studio ودايس Enable Generative Language API</div>`;
        }
    }
</script>

</body>
</html>
