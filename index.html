<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0a0a12; --card: #1e1e2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); max-width: 700px; margin: auto; border: 1px solid var(--primary); }
        .motivational { font-style: italic; color: #ff9f43; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .key-box { background: #2d3436; padding: 15px; border-radius: 12px; border: 1px dashed var(--success); margin-bottom: 20px; }
        .key-text { color: var(--success); font-family: monospace; font-weight: bold; user-select: all; cursor: pointer; background: #000; padding: 8px; border-radius: 5px; display: block; overflow-wrap: break-word; font-size: 0.85rem; }
        .custom-file-upload { display: inline-block; padding: 15px 30px; cursor: pointer; background-color: var(--primary); color: white; border-radius: 12px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; color: white; }
        .btn-summary { background-color: var(--success); }
        .btn-exam { background-color: var(--danger); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .result-box { background-color: #2f3542; padding: 25px; border-radius: 15px; margin-top: 25px; text-align: right; line-height: 1.8; font-size: 1.1rem; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; margin-bottom: 15px; text-align: center; font-family: monospace; }
        footer { margin-top: 30px; font-size: 0.8rem; color: #777; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 5px; color: var(--primary);">🚀 منصة زنقة الكلاب</h1>
    <p style="margin-bottom: 20px;">تطوير المبدع: <span style="color: var(--success); font-weight: bold;">محمود جمال</span></p>
    <div class="motivational" id="quote">"عاش يا دحيح.. الامتياز بيناديك!"</div>
    
    <div id="setupSection">
        <div class="key-box">
            <p style="margin-top:0; font-size: 0.9rem;">🔑 كود التفعيل للدفعة (انسخه وحطه في الخانة اللي تحت):</p>
            <span class="key-text" id="displayKey">AIzaSyBoY4hFrj7PGQeTwxv0BM2YxMNhb5G8950</span>
        </div>
        <input type="text" id="userInputKey" placeholder="الصق كود التفعيل هنا يا بطل...">
        <br>
        <button class="btn" style="background: var(--primary)" onclick="saveAndStart()">تفعيل وتشغيل المنصة ⚡</button>
    </div>

    <div id="mainApp" class="hidden">
        <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة (PDF)</label>
        <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="updateFileStatus(this)">
        <br>
        <button class="btn btn-summary" onclick="process('summary')">لخصلي المنهج</button>
        <button class="btn btn-exam" onclick="process('exam')">امتحنني MCQ 🎵</button>
        <p style="font-size: 11px; color: #666; cursor: pointer; margin-top: 15px;" onclick="resetAuth()">تغيير المفتاح 🔑</p>
    </div>

    <audio id="bgMusic" src="song.mp3" loop></audio>

    <div id="results" class="hidden result-box">
        <h3 id="resHeader" style="color: var(--success); border-bottom: 1px solid #444; padding-bottom: 10px;">⏳ جاري المعالجة...</h3>
        <div id="resContent" style="white-space: pre-wrap;"></div>
    </div>

    <footer>حقوق البرمجة محفوظة لمحمود جمال © 2026</footer>
</div>

<script>
    // إعدادات مكتبة PDF
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const quotes = [
        "عاش يا دحيح.. الامتياز محجوز ليك! 🚀",
        "مفيش مستحيل مع محمود جمال.. ركز يا بطل!",
        "المنهج طويل بس إنت أطول منه.. هانت!",
        "ركز يا وحش.. مفيش وقت للصياح الآن!",
        "اللهم لا سهل إلا ما جعلته سهلاً.. استعن بالله."
    ];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // فحص هل المستخدم فعل الموقع قبل كدة؟
    window.onload = () => {
        if (localStorage.getItem('active_key')) {
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }
    };

    function saveAndStart() {
        const k = document.getElementById('userInputKey').value.trim();
        if (k.length > 20) {
            localStorage.setItem('active_key', k);
            location.reload();
        } else { alert("حط الكود صح يا دحيح!"); }
    }

    function resetAuth() {
        localStorage.removeItem('active_key');
        location.reload();
    }

    function updateFileStatus(el) {
        if (el.files.length > 0) {
            document.getElementById('fileLabel').innerText = '✅ جاهز: ' + el.files[0].name;
            // لمسة سحرية: تشغيل وإيقاف الصوت عشان المتصفح يوافق يفتحه بعدين
            const m = document.getElementById('bgMusic');
            m.play().then(() => m.pause());
        }
    }

    async function process(mode) {
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("ارفع المحاضرة الأول يا حودة!"); return; }

        const resDiv = document.getElementById('results');
        const resContent = document.getElementById('resContent');
        const music = document.getElementById('bgMusic');
        
        resDiv.classList.remove('hidden');
        resContent.innerHTML = "<b>جاري قراءة الملف وطلب مساعدة Gemini.. استعنا على الشقا بالله.. 🧠</b>";
        
        if (mode === 'exam') {
            music.currentTime = 0;
            music.play().catch(e => console.log("Music blocked by browser policy"));
        } else {
            music.pause();
        }

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            let fullText = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + " ";
            }

            // الـ Prompt المتطور عشان الـ MCQ والتلخيص
            const prompt = mode === 'summary' ? 
                `أنت مساعد دراسي ذكي. قم بتلخيص النص التالي بأسلوب نقاط (bullet points) واضحة ومنظمة جداً باللغة العربية، وركز على المعلومات المهمة للبيت والأسرة:\n\n${fullText.substring(0, 12000)}` :
                `بناءً على النص التالي، قم بعمل امتحان مكون من 5 أسئلة اختيار من متعدد (MCQ) باللغة العربية. لكل سؤال 4 اختيارات (أ، ب، ج، د). وفي نهاية الرد تماماً، اكتب قائمة بالإجابات الصحيحة. النص:\n\n${fullText.substring(0, 12000)}`;

            const key = localStorage.getItem('active_key');
            // استخدام v1beta مع gemini-1.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            document.getElementById('resHeader').innerText = mode === 'summary' ? "📝 ملخص المنهج:" : "✍️ امتحان التحدي (MCQ):";
            resContent.innerText = data.candidates[0].content.parts[0].text;

        } catch (err) {
            resContent.innerHTML = `<b style="color:var(--danger)">حصلت مشكلة:</b> ${err.message}.<br>تأكد إن المفتاح لسه شغال وما اتقفلش.`;
            music.pause();
        }
    }
</script>
</body>
</html>
