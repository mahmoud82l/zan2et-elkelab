<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زنقة الكلاب - محمود جمال</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #121212; --card: #1e1e2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-width: 750px; margin: auto; border: 2px solid var(--primary); }
        .motivational { font-style: italic; color: #ff9f43; margin-bottom: 20px; font-size: 1.2rem; min-height: 1.5em; }
        .key-section { background: #2d3436; padding: 20px; border-radius: 12px; border: 1px dashed var(--success); margin-bottom: 20px; }
        .key-text { color: var(--success); font-family: monospace; font-weight: bold; user-select: all; cursor: pointer; background: #000; padding: 5px 10px; border-radius: 4px; }
        .custom-file-upload { display: inline-block; padding: 15px 30px; cursor: pointer; background-color: var(--primary); color: white; border-radius: 10px; font-weight: bold; margin-bottom: 20px; border: 2px dashed #ffffff; transition: 0.3s; }
        .custom-file-upload:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(55, 66, 250, 0.4); }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; transition: 0.3s; color: white; }
        .btn-summary { background-color: var(--success); }
        .btn-exam { background-color: var(--danger); }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .result-box { background-color: #2f3542; padding: 25px; border-radius: 15px; margin-top: 25px; text-align: right; line-height: 1.8; font-size: 1.1rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; margin-bottom: 15px; text-align: center; }
        hr { border: 0; border-top: 1px solid #3d3d5c; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 5px;">🚀 منصة زنقة الكلاب</h1>
    <p style="color: #aaa; margin-bottom: 20px;">النسخة الذهبية - تطوير المبدع: <b>محمود جمال</b></p>
    <div class="motivational" id="quote">"عاش يا دحيح.. الامتياز بيناديك!"</div>
    
    <div id="setupSection">
        <div class="key-section">
            <p style="margin-top:0">🔑 انسخ كود التفعيل ده وحطه في الخانة اللي تحته:</p>
            <span class="key-text" title="اضغط للنسخ">AIzaSyCFt_yR9jzNjNjNjNjNjNjNjNjNjNjNjNj</span>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">(لو المفتاح وقف، محمود هيغيره علطول)</p>
        </div>
        <input type="text" id="geminiKey" placeholder="حط كود التفعيل هنا يا وحش...">
        <br>
        <button class="btn" style="background: var(--primary)" onclick="startApp()">تفعيل ودخول ⚡</button>
    </div>

    <div id="appBody" class="hidden">
        <label for="studyFile" class="custom-file-upload" id="fileLabel">📁 ارفع المحاضرة (PDF)</label>
        <input type="file" id="studyFile" accept=".pdf" style="display:none" onchange="handleFileSelect(this)">
        <br>
        <button class="btn btn-summary" onclick="process('summary')">لخصلي المنهج</button>
        <button class="btn btn-exam" onclick="process('exam')">امتحنني MCQ</button>
        <p style="font-size: 0.8rem; color: #aaa; cursor: pointer; text-decoration: underline;" onclick="resetApp()">تغيير المفتاح</p>
    </div>

    <audio id="examMusic" src="song.mp3" loop></audio>

    <div id="results" class="hidden result-box">
        <h3 id="resHeader" style="color: var(--success); border-bottom: 1px solid #444; padding-bottom: 10px;">⏳ جاري التحضير...</h3>
        <div id="resContent"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const quotes = [
        "عاش يا دحيح.. الامتياز بيناديك!",
        "مفيش مستحيل مع محمود جمال.. ركز يا بطل!",
        "المنهج طويل بس إنت أطول منه 🚀",
        "يا رب نخلص ونرتاح.. هانت يا وحش!",
        "اللهم انفعنا بما علمتنا.. ركز يا دكتور!"
    ];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    window.onload = () => {
        if (localStorage.getItem('gemini_token')) {
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
        }
    };

    function startApp() {
        const val = document.getElementById('geminiKey').value.trim();
        if (val.length > 10) {
            localStorage.setItem('gemini_token', val);
            location.reload();
        } else { alert("دخل المفتاح صح يا دحيح!"); }
    }

    function resetApp() { localStorage.removeItem('gemini_token'); location.reload(); }

    function handleFileSelect(input) {
        if (input.files.length > 0) {
            document.getElementById('fileLabel').innerText = '✅ جاهز: ' + input.files[0].name;
            // تشغيل وهمي للصوت عشان المتصفح يسمح به لاحقاً
            const audio = document.getElementById('examMusic');
            audio.play().then(() => audio.pause());
        }
    }

    async function process(type) {
        const fileInput = document.getElementById('studyFile');
        if (fileInput.files.length === 0) { alert("فين الملف يا حودة؟"); return; }

        const results = document.getElementById('results');
        const content = document.getElementById('resContent');
        const music = document.getElementById('examMusic');
        
        results.classList.remove('hidden');
        content.innerHTML = "<b>جاري قراءة الملف وطلب المساعدة من Gemini.. ثواني.. 🧠</b>";
        
        if (type === 'exam') music.play().catch(e => console.log("Audio block"));

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            let text = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const items = await page.getTextContent();
                text += items.items.map(item => item.str).join(" ") + "\n";
            }

            const prompt = type === 'summary' ? 
                `لخص النص الأكاديمي التالي في نقاط منظمة وواضحة جداً باللغة العربية:\n\n${text.substring(0, 10000)}` :
                `بناءً على النص التالي، قم بعمل امتحان مكون من 5 أسئلة اختيار من متعدد (MCQ). لكل سؤال 4 اختيارات. اذكر الإجابات الصحيحة في نهاية الامتحان بشكل منفصل. النص:\n\n${text.substring(0, 10000)}`;

            const key = localStorage.getItem('gemini_token');
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            document.getElementById('resHeader').innerText = type === 'summary' ? "📝 ملخص المنهج:" : "✍️ امتحان التحدي:";
            content.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            
            if (type === 'summary') { music.pause(); music.currentTime = 0; }

        } catch (err) {
            content.innerHTML = `<b style="color:var(--danger)">حصلت مشكلة:</b> ${err.message}`;
            music.pause();
        }
    }
</script>
</body>
</html>
