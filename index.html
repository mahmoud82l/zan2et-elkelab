<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zn8h alklab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    
    <style>
        :root { --primary: #3742fa; --success: #2ed573; --danger: #ff4757; --bg: #0a0a12; --card: #1e1e2f; --chat-ai: #2d3436; --chat-user: #3742fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; text-align: center; overflow-x: hidden; }
        .container { max-width: 650px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .btn { border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; margin: 10px 0; font-weight: bold; color: white; width: 95%; transition: 0.3s; }
        .btn-summary { background: var(--success); }
        .btn-exam { background: var(--danger); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn-chat { background: #eccc68; color: #000; box-shadow: 0 0 15px rgba(236, 204, 104, 0.4); }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .hidden { display: none !important; }
        .file-label { display: block; background: var(--primary); padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; border: 2px dashed #fff; }
        input[type="text"], input[type="number"], select { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: #fff; text-align: center; margin-bottom: 15px; font-family: inherit; }
        
        .controls-box { background: #12151e; border: 1px solid #3d4451; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: right; font-size: 14px; }
        .controls-box label { display: inline-block; margin-right: 10px; color: #aaa; }
        .controls-box input[type="number"], .controls-box select { width: auto; display: inline-block; padding: 8px; margin: 0 5px 10px 0; }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; text-align: right; }
        .chat-header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); }
        .chat-header h2 { margin: 0; font-size: 1.2rem; color: var(--success); }
        .back-btn { background: var(--danger); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-start; } 
        .msg-row.ai { justify-content: flex-end; } 
        .msg-bubble { max-width: 85%; padding: 15px 20px; border-radius: 15px; line-height: 1.8; font-size: 16px; word-wrap: break-word; }
        .msg-bubble.user { background: var(--chat-user); color: #fff; border-top-right-radius: 0; }
        .msg-bubble.ai { background: var(--chat-ai); color: #e0e0e0; border-top-left-radius: 0; border: 1px solid #444; }
        .msg-bubble a { color: #74b9ff; text-decoration: underline; font-weight: bold; }
        .chat-input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; margin: 0; width: auto; text-align: right; border-radius: 12px; }
        .chat-input-area button { width: auto; margin: 0; padding: 15px 25px; background: var(--success); border-radius: 12px; }
        
        .q-box { background: #1e1e2f; border: 1px solid #3d4451; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: right; }
        .opt-btn { display: block; width: 100%; text-align: right; padding: 12px; margin: 8px 0; background: #3d4451; border: 1px solid #555; border-radius: 8px; color: #fff; cursor: pointer; font-size: 15px; }
        .correct { background: var(--success) !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; }
        #score-board { font-size: 1.8rem; font-weight: bold; color: var(--success); margin: 20px 0; padding: 15px; border: 2px solid var(--success); border-radius: 12px; background: rgba(46, 213, 115, 0.1); }
        
        .support-box { margin-top: 40px; padding: 15px; background: #1a1a1a; border-radius: 12px; border: 1px dashed #555; text-align: center; }
        .ad-container { margin: 15px auto; padding: 5px; background: #12151e; border: 1px dashed #3d4451; border-radius: 10px; min-height: 50px; display: flex; justify-content: center; align-items: center; overflow: hidden; width: fit-content; }
    </style>
</head>
<body>

<div class="container" id="homePage">
    <h1 style="color: var(--primary); margin: 0 0 10px 0;">🚀 zn8h alklab</h1>
    <p style="margin-bottom: 20px; font-size: 14px; color: #bbb;">Designed by: <span style="color: var(--success); font-weight: bold;">Mahmoud gamal</span></p>

    <div class="ad-container">
        <iframe 
            srcdoc="<script type='text/javascript'>atOptions = { 'key' : '2c561b19eb0e3bfa10d7c2d1509ed9a1', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };</script><script type='text/javascript' src='https://www.highperformanceformat.com/2c561b19eb0e3bfa10d7c2d1509ed9a1/invoke.js'></script>" 
            width="320" height="50" frameborder="0" scrolling="no" 
            sandbox="allow-scripts allow-popups allow-same-origin">
        </iframe>
    </div>

    <div id="mainApp">
        <label for="pdfInput" class="file-label" id="fileLabel">📁 اضغط هنا واختار المحاضرة (PDF)</label>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
        
        <div class="controls-box" style="border-color: #eccc68;">
            <h4 style="margin: 0 0 10px 0; color: #eccc68;">📄 حدد الصفحات اللي هتذاكرها:</h4>
            <label>من صفحة:</label>
            <input type="number" id="pageStart" value="1" min="1" style="width: 60px;">
            <label>إلى صفحة:</label>
            <input type="number" id="pageEnd" value="3" min="1" style="width: 60px;">
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 0 0;">* لو الملف متصور (صور)، يفضل تختار 3 لـ 5 صفحات بالكتير عشان وقت المعالجة.</p>
        </div>

        <div class="controls-box">
            <h4 style="margin: 0 0 10px 0; color: var(--success);">⚙️ إعدادات الامتحان:</h4>
            <label>عدد الأسئلة:</label>
            <input type="number" id="qCount" value="10" min="5" max="30">
            <br>
            <label>الصعوبة:</label>
            <select id="qDiff">
                <option value="سهل ومباشر">سهل مباشر</option>
                <option value="متوسط يشمل فهم وتذكر" selected>متوسط</option>
                <option value="صعب جداً وأسئلة استنتاجية خبيثة">صعب (تفكير عميق)</option>
            </select>
        </div>

        <button class="btn btn-summary" onclick="startProcess('summary')">لخصلي المنهج (شامل)</button>
        <button class="btn btn-exam" onclick="startProcess('exam')">امتحان تفاعلي 🎵</button>
        <button class="btn btn-chat" onclick="openChatMode()">💬 افتح شات المنهج (مفتوح)</button>
    </div>

    <audio id="examMusic" src="song.mp3" loop></audio>

    <div id="resBox" class="hidden" style="margin-top: 25px;">
        <h3 id="resTitle" style="color: var(--success); border-bottom: 1px solid #444; padding-bottom: 10px;">النتيجة</h3>
        <div id="score-board" class="hidden"></div>
        <div id="resContent" style="text-align:right; line-height:1.8;"></div>
    </div>

    <div class="support-box">
        <h4 style="color: #ff9f43; margin-top: 0;">📩 تواصل مع المطور</h4>
        <p style="font-size: 12px; color: #aaa;">لو قابلك أي عطل أو عندك اقتراح، ابعتلي هنا:</p>
        <input type="text" id="contactMsg" placeholder="اكتب رسالتك..." style="width: 100%; box-sizing: border-box;">
        <button onclick="sendToSupport()" class="btn" style="background: #25D366; width: auto; padding: 10px 20px; font-size: 14px;">إرسال عبر واتساب 💬</button>
    </div>
</div>

<div id="chatPage" class="hidden">
    <div class="chat-header">
        <h2>💬 دكتور المادة (AI)</h2>
        <button class="back-btn" onclick="closeChatMode()">🔙 رجوع</button>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <input type="text" id="chatMsg" placeholder="اسأل، اطلب أسئلة، أو مصادر خارجية..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button class="btn" style="margin:0; padding:10px 20px;" onclick="sendChat()">إرسال 🚀</button>
    </div>
</div>

<script>
    // --- الحماية الفولاذية ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
        if (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0))) return false;
    };
    (function(){ setInterval(function(){ debugger; }, 100); })();
    // -------------------------

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let globalPdfText = ""; 
    let chatHistory = []; 

    function sendToSupport() {
        const msg = document.getElementById('contactMsg').value.trim();
        if(!msg) return alert("اكتب رسالة الأول يا بطل!");
        const phoneNumber = "201288894905"; 
        window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent("رسالة من منصة zn8h alklab: \n" + msg)}`, '_blank');
    }

    document.getElementById('pdfInput').onchange = function() {
        if(this.files[0]) document.getElementById('fileLabel').innerText = "✅ تم التحميل: " + this.files[0].name;
    };

    function formatText(text) {
        text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        text = text.replace(/\n/g, '<br>');
        return text;
    }

    async function extractTextFromPage(page) {
        const textContent = await page.getTextContent();
        let pageText = textContent.items.map(it => it.str).join(" ");
        
        if (pageText.trim().length < 20) {
            console.log("الصفحة دي صورة! جاري تشغيل الـ OCR...");
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'ara');
                pageText = text;
            } catch (err) {
                console.error("خطأ في قراءة الصورة:", err);
            }
        }
        return pageText;
    }

    async function openChatMode() {
        const fileInput = document.getElementById('pdfInput');
        if(!fileInput.files[0]) return alert("ارفع المحاضرة الأول!");
        
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('chatPage').classList.remove('hidden');
        const chatBox = document.getElementById('chatBox');
        
        if (chatHistory.length === 0) {
            chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai">بقرأ المحاضرة.. ثواني ⏳<br><small style="color:#aaa;">(لو الملف متصور بالموبايل، ممكن ياخد وقت أطول شوية)</small></div></div>`;
            try {
                const arrayBuffer = await fileInput.files[0].arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                globalPdfText = ""; 
                
                let pStart = parseInt(document.getElementById('pageStart').value) || 1;
                let pEnd = parseInt(document.getElementById('pageEnd').value) || 20;
                if(pStart < 1) pStart = 1;
                if(pEnd > pdf.numPages) pEnd = pdf.numPages;
                if((pEnd - pStart) > 20) pEnd = pStart + 20;

                for (let i = pStart; i <= pEnd; i++) {
                    const page = await pdf.getPage(i);
                    globalPdfText += (await extractTextFromPage(page)) + " ";
                }
                
                chatHistory = [{ 
                    role: "system", 
                    content: `أنت دكتور جامعي خبير ومرشد أكاديمي ذكي. هذا هو نص المحاضرة: ${globalPdfText.substring(0, 15000)}. مهمتك مساعدة الطالب على فهم المنهج بعمق. أجب بأسلوب احترافي، دقيق، ومبسط. استخدم الأمثلة، ونسق إجاباتك بالعناوين العريضة، وقدم مصادر وروابط حقيقية إذا طلب منك.` 
                }];
                
                chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai">أهلاً بيك! أنا دكتور المادة، قريت الصفحات اللي حددتها وجاهز. تقدر تسألني في أي جزء مش فاهمه، أو أطلب مني أسئلة بمستويات معينة! 🚀</div></div>`;
            } catch(e) {
                chatBox.innerHTML = `<div class="msg-row ai"><div class="msg-bubble ai" style="background:var(--danger)">عطل في القراءة: ${e.message}</div></div>`;
            }
        }
    }

    function closeChatMode() {
        document.getElementById('chatPage').classList.add('hidden');
        document.getElementById('homePage').classList.remove('hidden');
    }

    async function sendChat() {
        const inputField = document.getElementById('chatMsg');
        const msgText = inputField.value.trim();
        if(!msgText) return;

        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="msg-row user"><div class="msg-bubble user">${msgText}</div></div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        chatHistory.push({ role: "user", content: msgText });

        const loadingId = "load-" + Date.now();
        chatBox.innerHTML += `<div id="${loadingId}" class="msg-row ai"><div class="msg-bubble ai">بجهز الرد... ✍️</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const key = "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";
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory, model: "llama-3.1-8b-instant", temperature: 0.7 })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="msg-row ai"><div class="msg-bubble ai">${formatText(aiReply)}</div></div>`;
            chatHistory.push({ role: "assistant", content: aiReply });
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="msg-row ai"><div class="msg-bubble ai" style="background:var(--danger)">عطل في الاتصال ❌</div></div>`;
        }
    }

    async function startProcess(mode) {
        const fileInput = document.getElementById('pdfInput');
        if(!fileInput.files[0]) return alert("ارفع المحاضرة!");

        const resBox = document.getElementById('resBox');
        const resContent = document.getElementById('resContent');
        const music = document.getElementById('examMusic');
        const scoreBoard = document.getElementById('score-board');
        
        resBox.classList.remove('hidden');
        if(scoreBoard) scoreBoard.classList.add('hidden');
        resContent.innerHTML = "<b>جاري التحليل وتلخيص المنهج... 🧠 ⏳<br><small>(لو الملف متصور هياخد شوية وقت عشان بيعمل مسح للصور)</small></b>";
        
        if(mode === 'exam') music.play().catch(() => {}); else { music.pause(); music.currentTime = 0; }

        try {
            const arrayBuffer = await fileInput.files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let text = "";
            
            let pStart = parseInt(document.getElementById('pageStart').value) || 1;
            let pEnd = parseInt(document.getElementById('pageEnd').value) || 15;
            
            if(pStart < 1) pStart = 1;
            if(pEnd > pdf.numPages) pEnd = pdf.numPages;
            if((pEnd - pStart) > 20) {
                pEnd = pStart + 20;
                alert("عشان السيرفر ميهنجش، هنلخص 20 صفحة بس. لو الملف صور، ممكن ياخد دقيقة أو دقيقتين!");
            }

            for (let i = pStart; i <= pEnd; i++) { 
                const page = await pdf.getPage(i);
                text += (await extractTextFromPage(page)) + " "; 
            }

            const qCount = document.getElementById('qCount').value || 10;
            const qDiff = document.getElementById('qDiff').value || "متوسط";

            const prompt = mode === 'summary' ? 
                `أنت أستاذ جامعي. قم بعمل ملخص أكاديمي دقيق وشامل للنص التالي في نقاط وعناوين: ${text.substring(0, 5000)}` :
                `قم بعمل امتحان MCQ مكون من (${qCount} أسئلة) بمستوى صعوبة (${qDiff}) من النص.
                تحذير هام جداً: إياك كتابة أي مقدمات أو أرقام للأسئلة. استخدم حرف Q فقط لتمييز السؤال. يجب أن يكون التنسيق هكذا تماماً:
                Q: السؤال؟
                A) اختيار 1
                B) اختيار 2
                C) اختيار 3
                D) اختيار 4
                Correct: A
                
                النص: ${text.substring(0, 5000)}`;

            const key = "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";

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: "user", content: prompt }], model: "llama-3.1-8b-instant" })
            });

            const data = await response.json();
            
            if (data.error) {
                resContent.innerHTML = `<span style="color:var(--danger)">❌ عذراً يا بطل: ${data.error.message} (غالباً ضغط على السيرفر، جرب كمان دقيقة)</span>`;
                return;
            }

            if (data.choices && data.choices.length > 0) {
                const output = data.choices[0].message.content;
                if (mode === 'summary') {
                    document.getElementById('resTitle').innerText = "📝 الملخص الشامل:";
                    resContent.innerHTML = formatText(output);
                } else {
                    renderInteractiveExam(output);
                }
            } else {
                resContent.innerHTML = "❌ السيرفر مرجعش أي كلام.. جرب ترفع ملف أصغر شوية.";
            }

        } catch (e) { resContent.innerHTML = "❌ خطأ فني: " + e.message; }
    }

    function renderInteractiveExam(text) {
        document.getElementById('resTitle').innerText = "✍️ امتحان التحدي:";
        const resContent = document.getElementById('resContent'); resContent.innerHTML = "";
        const scoreBoard = document.getElementById('score-board');
        
        let cleanText = text.replace(/\*\*/g, ''); 
        cleanText = cleanText.replace(/(?:^|\n)(?:Q|س|السؤال)?\s*\d+[\.\-\)]\s*/gi, '\nQ: '); 
        
        const qBlocks = cleanText.split(/Q:/g).filter(b => b.trim().length > 15);
        let score = 0; let answered = 0;

        if(qBlocks.length === 0) {
            resContent.innerHTML = "<p style='color:var(--warning);'>⚠️ حصلت لخبطة في الذكاء الاصطناعي.. جرب تدوس على زرار الامتحان تاني!</p>";
            return;
        }

        qBlocks.forEach((block, idx) => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            const questionText = lines[0];
            const options = lines.filter(l => l.match(/^[A-Dأ-د][\)\.\-]/i));
            const correctLine = lines.find(l => l.toLowerCase().includes('correct'));
            const correctLetter = correctLine ? correctLine.replace(/correct/i, '').replace(/[:\-\s]/g, '').charAt(0).toUpperCase() : "";

            if(options.length < 2) return; 

            const qDiv = document.createElement('div'); qDiv.className = 'q-box';
            qDiv.innerHTML = `<b>${idx+1}. ${questionText}</b>`;

            options.forEach(opt => {
                const letter = opt.charAt(0).toUpperCase(); 
                const btn = document.createElement('button');
                btn.className = 'opt-btn'; btn.innerText = opt;
                btn.onclick = () => {
                    if(qDiv.dataset.done) return; qDiv.dataset.done = "true"; answered++;
                    
                    if(letter === correctLetter || (letter === 'أ' && correctLetter === 'A') || (letter === 'ب' && correctLetter === 'B') || (letter === 'ج' && correctLetter === 'C') || (letter === 'د' && correctLetter === 'D')) { 
                        btn.classList.add('correct'); score++; 
                    } else { 
                        btn.classList.add('wrong'); 
                        Array.from(qDiv.querySelectorAll('.opt-btn')).forEach(b => { 
                            let bLetter = b.innerText.charAt(0).toUpperCase();
                            if(bLetter === correctLetter || (bLetter === 'أ' && correctLetter === 'A') || (bLetter === 'ب' && correctLetter === 'B') || (bLetter === 'ج' && correctLetter === 'C') || (bLetter === 'د' && correctLetter === 'D')) {
                                b.classList.add('correct'); 
                            }
                        }); 
                    }
                    if(answered === qBlocks.length) { 
                        scoreBoard.innerText = `درجتك: ${score} من ${qBlocks.length} 🥳`; 
                        scoreBoard.classList.remove('hidden'); 
                        window.scrollTo({ top: scoreBoard.offsetTop - 20, behavior: 'smooth' }); 
                    }
                };
                qDiv.appendChild(btn);
            });
            resContent.appendChild(qDiv);
        });
    }
</script>
</body>
</html>
